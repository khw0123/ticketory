<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>20261704 강현우</title>
    <!-- style -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- script.js -->
    <script defer src="script.js" type="module"></script>
    <!-- font awesome -->
    <script src="https://kit.fontawesome.com/747f13c723.js" crossorigin="anonymous"></script>
    <!-- datepicker -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>
    <link rel="stylesheet" href="./css/datePicker.css">
    <script>
      $( function() {
        $( "#datepicker" ).datepicker({
          dateFormat: "yy.mm.dd",
          showButtonPanel: true,

          beforeShow: function () {
            setTimeout(bindTodayButton, 0);
          },

          onChangeMonthYear: function () {
            setTimeout(bindTodayButton, 0);
          },
        });

        function bindTodayButton() {
          $(".ui-datepicker-current")
            .off("click")
            .on("click", function (e) {
              e.preventDefault();

              const today = new Date();

              $("#datepicker").datepicker("setDate", today);
              $("#datepicker").datepicker("hide");
            });
        }
        $( "#datepicker" ).datepicker( "option", "dateFormat", "yy.mm.dd" );
      });
      
  
    </script>

    <script>
      $(document).ready(function(){               
        $.datepicker.setDefaults({
        closeText: "닫기",
        currentText: "오늘",
        prevText: '이전 달',
        nextText: '다음 달',
        monthNames: ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'],
        monthNamesShort: ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'],
        dayNames: ['일', '월', '화', '수', '목', '금', '토'],
        dayNamesShort: ['일', '월', '화', '수', '목', '금', '토'],
        dayNamesMin: ['일', '월', '화', '수', '목', '금', '토'],
        weekHeader: "주",
        yearSuffix: '년'
        });    
      });

    </script>
  </head>
  <body>
    <!-- start page -->
    <div class="wrap startPage formPage none">
      <div class="start">
        <h1 class="startTitle">Ticketory</h1>
        <div class="btn-group">
          <!-- test user : id = test@test.com pw = testtest, 로그아웃 구현X -->
          <div class="userBtn loginBtn">로그인</div>
          <div class="userBtn registerBtn">회원가입</div>
        </div>
      </div>
    </div>

    <!-- main tab -->
    <div class="wrap mainPage none">
      <div class="header">
        <div class="title">
          <div class="icon">1</div>
          <div class="text">2</div>
        </div>
        <div class="add">
          <div class="addBtn">예매내역 추가</div>
        </div>
      </div>
      <div class="viewerWrap">
        <div class="viewer">
          <div class="btnAllContent viewerContent">5</div>
          <div class="btn1Content viewerContent">1</div>
          <div class="btn2Content viewerContent">2</div>
          <div class="btn3Content viewerContent">3</div>
          <div class="btn4Content viewerContent">4</div>
        </div>
      </div>
      <div class="userBar">
        <div class="userIcon">
          <div class="nicknameShow"></div>
        </div>
        <div class="signoutIcon">
          <i class="fa-solid fa-arrow-right-from-bracket fa-2xl" style="color: white;"></i>
        </div>
      </div>
      <div class="navBar">
        <div class="btnAll btn">
          <i class="fa-solid fa-bars fa-2xl" style="color: rgb(255, 255, 255);"></i>
          <h1 class="btnAllName btnName none">전체</h1>
        </div>
        <div class="btn1 btn">
          <i class="fa-solid fa-baseball-bat-ball fa-2xl" style="color: rgb(255, 255, 255);"></i>
          <h1 class="btn1Name btnName none">스포츠</h1>
        </div>
        <div class="btn2 btn">
          <i class="fa-solid fa-music fa-2xl" style="color: rgb(255, 255, 255);"></i>
          <h1 class="btn2Name btnName none">클래식</h1>
        </div>
        <div class="btn3 btn">
          <i class="fa-solid fa-microphone-lines fa-2xl" style="color: rgb(255, 255, 255);"></i>
          <h1 class="btn3Name btnName none">콘서트</h1>
        </div>
        <div class="btn4 btn">
          <i class="fa-solid fa-plane fa-2xl" style="color: rgb(255, 255, 255);"></i>
          <h1 class="btn4Name btnName none">교통</h1>
        </div>
      </div>
    </div>

    <!-- add page -->
     <div class="wrap addPage formPage none">
      <div class="toStartBtn3 toStartBtn">
        <i class="fa-solid fa-arrow-left fa-lg" style="color: #222;"></i>
      </div>
      <div class="addPlan">
        <div class="textGroup">
          <h1>예매 내역(티켓) 추가</h1>
          <p class="formDescription">계정을 만들어 이용해 보세요.</p>
        </div>
        <form id="add">
          <div class="inputFlex">

            <div class="inputFlexItem">
              <div class="inputBox">
                <div class="selectCategory"> 
                  <select name="category" id="addCategory" class="formInput" required>
                    <option selected disabled value="">카테고리</option>
                    <option value="sport">스포츠</option>
                    <option value="classic">클래식</option>
                    <option value="concert">콘서트</option>
                    <option value="travel">교통</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="inputFlexItem">
              <div class="ndFlex">
                <div class="selectIcon">
                  <div class="selectIconBtn">
                    <i class="fa-regular fa-square-plus fa-2xl"></i>
                  </div>
                  <div id="addIcon" class="none"></div>
                </div>
                  
                <div class="rdFlex">
                  <div class="ticketName inputBox">
                    <input type="text" id="ticketName" placeholder="티켓 이름" class="formInput" required>
                  </div>
                  <div class="ticketDate inputBox">
                    <input type="text" id="datepicker" class="formInput" required placeholder="날짜 선택" autocomplete="off">
                  </div>
                </div>
              </div>
              <div class="textarea inputBox">
                    <textarea id="textarea" rows="10" class="formInput" style="width: 500px; height: 140px; resize:none;" required placeholder="간단한 티켓 설명"></textarea>
                </div>
            </div>

            <div class="inputFlexItem">
              <div class="btnGroup">
                <input type="reset" value="초기화" id="iconReset" >
                <input type="submit" class="addSubmit" value="추가하기" >
              </div> 
            </div>
            
          </div>
        </form>
      </div>
     </div>


    <!-- register page -->
    <div class="wrap registerPage formPage none">
      <div class="toStartBtn1 toStartBtn">
        <i class="fa-solid fa-arrow-left fa-lg" style="color: #222;"></i>
      </div>
      <div class="register formWrap">
        <div class="textGroup">
          <h1>회원가입</h1>
          <p class="formDescription">계정을 만들어 이용해 보세요.</p>
        </div>
        <form id="signUp">
          <div class="inputFlex">
            <div class="inputFlexItem">
              <div class="inputBox">
                <div class="inputBoxItem1">
                  <i class="fa-regular fa-envelope"></i>
                </div>
                <div class="inputBoxItem2">
                  <input type="email" id="signUpId" class="formInput" required placeholder="이메일">
                </div>
              </div>
            </div>
            <div class="inputFlexItem">
              <div class="inputBox">
                <div class="inputBoxItem1">
                  <i class="fa-regular fa-user"></i>
                </div>
                <div class="inputBoxItem2">
                  <input type="text" id="signUpNick" class="formInput" required placeholder="닉네임">
                </div>
              </div>
            </div>
            <div class="inputFlexItem">
              <div class="inputBox">
                <div class="inputBoxItem1">
                  <i class="fa-solid fa-lock"></i>
                </div>
                <div class="inputBoxItem2">
                  <input type="password" id="signUpPw" class="formInput" required placeholder="비밀번호">
                </div>
              </div>
            </div>
            <div class="inputFlexItem inputBox submit">
              <input type="submit" class=" formInput" id="upSubmit" value="가입하기">
            </div>
            <div class="inputFlexItem">
              <div class="isAleady">
                <p>이미 계정이 있으신가요?? <span class="isAleadyOBtn">로그인</span></p>
              </div>
            </div>
        </form>
        </div>
      </div>
    </div>

    <!-- login page -->
     <div class="wrap loginPage formPage none">
       <div class="toStartBtn2 toStartBtn">
         <i class="fa-solid fa-arrow-left fa-lg" style="color: #222;"></i>
       </div>
      <div class="login formWrap">
        <div class="textGroup">
          <h1>로그인</h1>
          <p class="formDescription">환영합니다! 다시 만나서 반가워요.</p>
        </div>
        <form id="signIn">
          <div class="inputFlex">
            <div class="inputFlexItem">
              <div class="inputBox">
                <div class="inputBoxItem1">
                  <i class="fa-regular fa-envelope"></i>
                </div>
                <div class="inputBoxItem2">
                  <input type="email" id="signInId" class="formInput" required placeholder="이메일">
                </div>
              </div>
            </div>
            <div class="inputFlexItem">
              <div class="inputBox">
                <div class="inputBoxItem1">
                  <i class="fa-solid fa-lock"></i>
                </div>
                <div class="inputBoxItem2">
                  <input type="password" id="signInPw" class="formInput" required placeholder="비밀번호">
                </div>
              </div>
            </div>
            <div class="inputFlexItem inputBox submit">
              <input type="submit" class=" formInput" id="inSubmit" value="로그인">
            </div>
            <div class="inputFlexItem">
              <div class="isAleady">
                <p>계정이 없으신가요? <span class="isAleadyXBtn">회원가입</span></p>
              </div>
            </div>
        </form>
      </div>
     </div>
  </body>
</html>
